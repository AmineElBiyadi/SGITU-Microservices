version: '3.9'

networks:
  sgitu-network:
    driver: bridge

volumes:
  mysql_payment_data:

services:

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    hostname: payment-db
    networks:
      - sgitu-network
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: payment_db
      MYSQL_USER: sgitu
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sgitupassword}
    volumes:
      - mysql_payment_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  phpmyadmin-payment:
    image: phpmyadmin:latest
    container_name: phpmyadmin-payment
    networks:
      - sgitu-network
    ports:
      - "8896:80"
    environment:
      PMA_HOST: payment-db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    depends_on:
      payment-db:
        condition: service_healthy
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: sgitu/payment-service:1.0.0
    container_name: payment-service
    hostname: payment-service
    networks:
      - sgitu-network
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-db:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sgitu
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-sgitupassword}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: ${JWT_SECRET:-SGITU_G6_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!}
      JWT_EXPIRATION: 86400000
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://notification-service:8085}
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8086
    restart: on-failure
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s