services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: sgitu-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: SGITUCLUSTER1234567890123456
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - sgitu-net

  g4-coordination:
    environment:
      SGITU_KAFKA_ENABLED: "${SGITU_KAFKA_ENABLED:-true}"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "${SPRING_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
      SGITU_G9_INCIDENT_TOPIC: "${SGITU_G9_INCIDENT_TOPIC:-incident.transport.topic}"
      SGITU_G7_POSITIONS_TOPIC: "${SGITU_G7_POSITIONS_TOPIC:-vehicule-positions}"
      SGITU_G3_MISSION_TOPIC: "${SGITU_G3_MISSION_TOPIC:-missions-lifecycle}"
      SGITU_G9_CONSUMER_GROUP: "${SGITU_G9_CONSUMER_GROUP:-g4-coordination-g9}"
      SGITU_G7_CONSUMER_GROUP: "${SGITU_G7_CONSUMER_GROUP:-g4-coordination-g7}"
      SGITU_G10_URL: "${SGITU_G10_URL:-http://g10-gateway:8080}"
      SGITU_G5_URL: "${SGITU_G5_URL:-http://g5-notifications:8085}"
      SGITU_G3_URL: "${SGITU_G3_URL:-http://g3-billetterie:8083}"
      SGITU_G7_URL: "${SGITU_G7_URL:-http://g7-tracking:8087}"
      SGITU_G9_URL: "${SGITU_G9_URL:-http://g9-incidents:8089}"
      SGITU_INTEGRATION_G5_NOTIFICATION_PATH: "${SGITU_INTEGRATION_G5_NOTIFICATION_PATH:-/api/notifications/send}"
      SGITU_INTEGRATION_G3_MISSION_LIFECYCLE_PATH: "${SGITU_INTEGRATION_G3_MISSION_LIFECYCLE_PATH:-/api/internal/missions/events}"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

networks:
  sgitu-net:
    name: sgitu-network
