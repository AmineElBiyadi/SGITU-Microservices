server.port=8080
spring.application.name=api_gateway

# ??? Base de donnÈes MySQL ???????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/gateway_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ?????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ??? IMPORTANT : dÈsactiver le routage Gateway pour les
#     endpoints /auth/** (traitÈs par le controller local) ??
spring.cloud.gateway.enabled=true

# Routes vers les microservices (‡ adapter avec les vrais ports)
spring.cloud.gateway.routes[0].id=billetterie
spring.cloud.gateway.routes[0].uri=http://billetterie-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/tickets/**

spring.cloud.gateway.routes[1].id=paiement
spring.cloud.gateway.routes[1].uri=http://paiement-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/paiement/**

spring.cloud.gateway.routes[2].id=notifications
spring.cloud.gateway.routes[2].uri=http://notification-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/notify/**

# ??? JWT ?????????????????????????????????????????????????
jwt.secret=G10_SECRET_KEY_SGITU_2025_SUPER_SECURE_KEY_32CHARS
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# ??? Actuator ????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info