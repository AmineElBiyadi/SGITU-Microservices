# =============================================================================
#  SGITU — Système de Gestion Intelligente des Transports Urbains
#  docker-compose.yml GLOBAL — Orchestration de tous les microservices
#  Groupe 10 — API Gateway & Sécurité
# =============================================================================

networks:
  sgitu-network:
    driver: bridge

# =============================================================================
#  VOLUMES PERSISTANTS
# =============================================================================
volumes:
  gateway-db-data:
  billetterie-db-data:
  abonnement-db-data:
  utilisateur-db-data:
  paiement-db-data:
  notification-db-data:
  vehicule-db-data:
  incidents-db-data:
  kafka-data:
  zookeeper-data:

# =============================================================================
#  SERVICES
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  #  INFRASTRUCTURE — Zookeeper + Kafka
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: sgitu-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - sgitu-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sgitu-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Gateway (MySQL)
  # ---------------------------------------------------------------------------
  gateway-db:
    image: mysql:8.0
    container_name: sgitu-gateway-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gateway_db
    ports:
      - "3360:3306"
    volumes:
      - gateway-db-data:/var/lib/mysql
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G10 — API Gateway & Sécurité (port 8080)
  # ---------------------------------------------------------------------------
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: sgitu-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://gateway-db:3306/gateway_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: G10_SECRET_KEY_SGITU_2025_SUPER_SECURE_KEY_32CHARS
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_EXPIRATION: 604800000
      G10_PUBLIC_BASE_URL: http://localhost:8080
      G10_NOTIFICATIONS_EMAIL_URL: http://notification-service:8085/api/notifications/send
    depends_on:
      gateway-db:
        condition: service_healthy
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Billetterie (MongoDB)
  # ---------------------------------------------------------------------------
  billetterie-db:
    image: mongo:7.0
    container_name: sgitu-billetterie-db
    environment:
      MONGO_INITDB_DATABASE: billetterie_db
    ports:
      - "27017:27017"
    volumes:
      - billetterie-db-data:/data/db
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G1 — Billetterie Dématérialisée (port 8081)
  #  NOTE : Dockerfile absent — ajouter un Dockerfile dans service-billetterie
  # ---------------------------------------------------------------------------
  service-billetterie:
    build:
      context: ./service-billetterie
      dockerfile: Dockerfile
    container_name: sgitu-billetterie
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATA_MONGODB_URI: mongodb://billetterie-db:27017/billetterie_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      COORDINATION_SERVICE_URL: http://coordination-service:8084
    depends_on:
      - billetterie-db
      - kafka
      - api-gateway
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Abonnements (MySQL)
  # ---------------------------------------------------------------------------
  abonnement-db:
    image: mysql:8.0
    container_name: sgitu-abonnement-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: abonnement_db
      MYSQL_USER: abonnement_user
      MYSQL_PASSWORD: abonnement_pass
    ports:
      - "3307:3306"
    volumes:
      - abonnement-db-data:/var/lib/mysql
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G2 — Gestion des Abonnements (port 8082)
  # ---------------------------------------------------------------------------
  service-abonnement:
    build:
      context: ./service-abonnement
      dockerfile: Dockerfile
    container_name: sgitu-abonnement
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      DB_NAME: abonnement_db
      DB_USER: abonnement_user
      DB_PASSWORD: abonnement_pass
      DB_ROOT_PASSWORD: root
      SPRING_DATASOURCE_URL: jdbc:mysql://abonnement-db:3306/abonnement_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # CORRECTION : URL correcte du service utilisateur (port 8083 + contexte /api)
      UTILISATEUR_SERVICE_URL: http://user-service:8083
      PAIEMENT_SERVICE_URL: http://payment-service:8086
    depends_on:
      abonnement-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Utilisateurs (PostgreSQL)
  # ---------------------------------------------------------------------------
  users-db:
    image: postgres:15-alpine
    container_name: sgitu-users-db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - utilisateur-db-data:/var/lib/postgresql/data
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G3 — Gestion des Utilisateurs (port 8083)
  # ---------------------------------------------------------------------------
  user-service:
    build:
      context: ./service-utilisateur
      dockerfile: Dockerfile
    container_name: sgitu-utilisateur
    ports:
      - "8083:8083"
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://users-db:5432/users_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: secret
      JWT_SECRET: G10_SECRET_KEY_SGITU_2025_SUPER_SECURE_KEY_32CHARS
      INTERNAL_KEY: SGITU_INTERNAL_SECRET_KEY_CHANGE_ME
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G4 — Coordination des Transports (port 8084)
  #  NOTE : service-coordination-transport contient seulement .gitkeep
  #         Placeholder — à implémenter par le groupe 4
  # ---------------------------------------------------------------------------
  # coordination-service:
  #   image: placeholder
  #   container_name: sgitu-coordination
  #   ports:
  #     - "8084:8084"
  #   networks:
  #     - sgitu-network

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Notifications (MySQL)
  # ---------------------------------------------------------------------------
  notification-db:
    image: mysql:8.0
    container_name: sgitu-notification-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notifications_db
      MYSQL_USER: sgitu
      MYSQL_PASSWORD: sgitu_pass
    ports:
      - "3314:3306"
    volumes:
      - notification-db-data:/var/lib/mysql
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Serveur mail de développement (MailHog)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sgitu-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Interface Web
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G5 — Notifications (port 8085)
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: ./service-notification
      dockerfile: Dockerfile
    container_name: sgitu-notification
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://notification-db:3306/notifications_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: sgitu
      SPRING_DATASOURCE_PASSWORD: sgitu_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      JWT_SECRET: G10_SECRET_KEY_SGITU_2025_SUPER_SECURE_KEY_32CHARS
      MYSQL_PASSWORD: sgitu_pass
    depends_on:
      notification-db:
        condition: service_healthy
      kafka:
        condition: service_started
      mailhog:
        condition: service_started
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Paiement (MySQL)
  # ---------------------------------------------------------------------------
  payment-db:
    image: mysql:8.0
    container_name: sgitu-payment-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "3308:3306"
    volumes:
      - paiement-db-data:/var/lib/mysql
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G6 — Paiement (port 8086)
  # ---------------------------------------------------------------------------
  payment-service:
    build:
      context: ./service-paiement
      dockerfile: Dockerfile
    container_name: sgitu-paiement
    ports:
      - "8086:8086"
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-db:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      NOTIFICATION_SERVICE_URL: http://notification-service:8085
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      payment-db:
        condition: service_healthy
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Suivi Véhicules (PostgreSQL)
  # ---------------------------------------------------------------------------
  vehicule-db:
    image: postgres:15-alpine
    container_name: sgitu-vehicule-db
    environment:
      POSTGRES_DB: g7_vehicules
      POSTGRES_USER: g7user
      POSTGRES_PASSWORD: g7password
    ports:
      - "5433:5432"
    volumes:
      - vehicule-db-data:/var/lib/postgresql/data
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U g7user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G7 — Suivi des Véhicules (port 8087)
  # ---------------------------------------------------------------------------
  g7-suivi-vehicules:
    build:
      context: ./service-suivi-vehicule
      dockerfile: Dockerfile
    container_name: sgitu-vehicule
    ports:
      - "8087:8087"
    environment:
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:postgresql://vehicule-db:5432/g7_vehicules
      SPRING_DATASOURCE_USERNAME: g7user
      SPRING_DATASOURCE_PASSWORD: g7password
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      vehicule-db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - sgitu-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G8 — Analyse & Données (port 8088)
  #  NOTE : service-analytique contient seulement .gitkeep
  #         Placeholder — à implémenter par le groupe 8
  # ---------------------------------------------------------------------------
  # analytics-service:
  #   image: placeholder
  #   container_name: sgitu-analytique
  #   ports:
  #     - "8088:8088"
  #   networks:
  #     - sgitu-network

  # ---------------------------------------------------------------------------
  #  BASE DE DONNÉES — Gestion Incidents (MySQL)
  # ---------------------------------------------------------------------------
  incidents-db:
    image: mysql:8.0
    container_name: sgitu-incidents-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sgitu_incidents
    ports:
      - "3309:3306"
    volumes:
      - incidents-db-data:/var/lib/mysql
    networks:
      - sgitu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  #  G9 — Gestion des Incidents (port 8089)
  #  NOTE : Dockerfile absent — ajouter un Dockerfile dans service-gestion-incidents
  # ---------------------------------------------------------------------------
  service-gestion-incidents:
    build:
      context: ./service-gestion-incidents
      dockerfile: Dockerfile
    container_name: sgitu-incidents
    ports:
      - "8089:8089"
    environment:
      SERVER_PORT: 8089
      SPRING_DATASOURCE_URL: jdbc:mysql://incidents-db:3306/sgitu_incidents?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      # CORRECTION : URL correcte du service utilisateur
      MICROSERVICES_UTILISATEUR_URL: http://user-service:8083
    depends_on:
      incidents-db:
        condition: service_healthy
    networks:
      - sgitu-network
    restart: unless-stopped
