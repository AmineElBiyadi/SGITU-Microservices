# =========================================================
# SGITU - Service Utilisateur (G3) - Port 8083
# =========================================================

spring.application.name=user-service

# --- Serveur ---
server.port=8083
server.servlet.context-path=/api

# --- Base de donnees PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/users_db
spring.datasource.username=postgres
spring.datasource.password=secret
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT (cle secrete partagee avec G10 - min 256 bits) ---
jwt.secret=SGITU_G3_JWT_SECRET_KEY_CHANGE_ME_IN_PRODUCTION_256BITS!!

# --- Cle interne (partagee avec G10 pour /users/internal/**) ---
internal.key=SGITU_INTERNAL_SECRET_KEY_CHANGE_ME

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Outgoing events G8: Analyse & donnees ---
events.user-status.url=http://localhost/api/v1/ingestion/users

# ---------------------------------------------------------
# Kafka Configuration
# ---------------------------------------------------------
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
