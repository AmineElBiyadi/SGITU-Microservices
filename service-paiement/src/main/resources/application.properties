spring.application.name=payment-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

notification.service.url=http://localhost:8085
subscription.service.url=http://localhost:8082

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true