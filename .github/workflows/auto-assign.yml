name: Auto Assign All Collaborators

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    if: github.event.pull_request.base.repo.full_name == 'AmineElBiyadi/SGITU-Microservices'
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prAuthor = context.payload.pull_request.user.login;

            const reviewers = [
              'ami-ne001',
              'amosnyirenda123',
              'anadouae',
              'Ayarssn',
              'ferdaoussBouchennou',
              'Houssam265',
              'Nouhaerr404',
              'Oumhella',
              'raihana10',
              'Taha7486'
            ].filter(login => login !== prAuthor);

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: reviewers
            });
